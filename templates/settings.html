<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillFlow — Settings</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ffffff;
            --surface: #f5f4ff;
            --surface2: #f0efff;
            --border: #e0deff;
            --accent: #4f46e5;
            --accent2: #818cf8;
            --accent3: #ef4444;
            --text: #1e1b4b;
            --muted: #6b7280;
            --card: #fafafe;
            --sidebar-w: 240px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 50;
        }

        .sidebar-logo {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
        }

        .logo-dot {
            width: 9px;
            height: 9px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
        }

        .logo-text span {
            color: var(--accent);
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.2rem 0.8rem;
            overflow-y: auto;
        }

        .nav-section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            padding: 0 0.7rem;
            margin: 1.2rem 0 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.8rem;
            border-radius: 9px;
            text-decoration: none;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.15s;
            cursor: pointer;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: rgba(79, 70, 229, 0.06);
            color: var(--text);
        }

        .nav-item.active {
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent);
        }

        .nav-item .nav-icon {
            font-size: 1rem;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        /* MAIN */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* CONTENT */
        .content {
            padding: 2rem;
            flex: 1;
            max-width: 800px;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
        }

        .page-title p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        /* SETTINGS CARD */
        .settings-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            animation: fadeUp 0.5s ease both;
        }

        .settings-tabs {
            display: flex;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .tab-btn {
            padding: 0.8rem 0;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }

        .btn-save {
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .danger-zone {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .danger-zone h3 {
            color: var(--accent3);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .btn-danger {
            background: #fff;
            color: var(--accent3);
            border: 1px solid var(--accent3);
            border-radius: 8px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: var(--accent3);
            color: #fff;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-logo">
            <div class="logo-dot"></div>
            <span class="logo-text">Bill<span>Flow</span></span>
        </a>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">⬛</span> Dashboard
            </a>
            <a href="customers.html" class="nav-item">
                <span class="nav-icon">👥</span> Customers
            </a>
            <a href="invoices.html" class="nav-item">
                <span class="nav-icon">🧾</span> Invoices
            </a>
            <a href="products.html" class="nav-item">
                <span class="nav-icon">📦</span> Products
            </a>
            <a href="payments.html" class="nav-item">
                <span class="nav-icon">💰</span> Payments
            </a>
            <div class="nav-section-label">System</div>
            <a href="settings.html" class="nav-item active">
                <span class="nav-icon">⚙️</span> Settings
            </a>
        </nav>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-right">
                <span style="font-size: 0.85rem; color: var(--muted);">v1.0.4 Platinum Edition</span>
            </div>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">
                    <h2>Settings</h2>
                    <p>Configure your personal profile and business preferences.</p>
                </div>
            </div>

            <div class="settings-card">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="profile">Profile</button>
                    <button class="tab-btn" data-tab="business">Business</button>
                    <button class="tab-btn" data-tab="notifications">Notifications</button>
                    <button class="tab-btn" data-tab="security">Security</button>
                </div>

                <div id="settingsContent">
                    <!-- Profile Tab -->
                    <div class="tab-pane" id="profileTab">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" value="" />
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" value="" />
                        </div>
                        <div class="form-group">
                            <label>Designation</label>
                            <input type="text" value="Administrator" />
                        </div>
                        <button class="btn-save">Update Profile</button>
                    </div>
                </div>

                <div class="danger-zone">
                    <h3>Danger Zone</h3>
                    <p style="font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem;">Once you delete your account, there is no going back. Please be certain.</p>
                    <button class="btn-danger">Delete Account</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/settings.js"></script>
</body>

</html>
